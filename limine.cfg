# ============================================================================
# HYDROOS - Limine Bootloader Configuration
# ============================================================================
# Muc dich: Cau hinh bootloader Limine boot truc tiep vao HydroOS Kernel
# Khong can thay doi gi khi da chuan hop ly.

# Boot menu timeout = 0: Boot thang vao OS, khong cho doi menu.
TIMEOUT=0

# ============================================================================
# HYDROOS ENTRY
# ============================================================================
# PROTOCOL: stivale2 hoac limine protocol
# KHUYEN DUNG: stivale2 de dam bao toan ven hien thi framebuffer.

:HydroOS
    PROTOCOL=stivale2
    KERNEL_PATH=boot:///kernel.elf
    RESOLUTION=1024x768x32
    BITMAP=boot:///font.bin
    COMMENT=HydroOS Vintage Minimalist Edition
